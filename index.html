<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GST 206 – Quiz Mode</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0f1a;--card:#111827;--accent:#22d3ee;--accent2:#a78bfa;
--correct:#10b981;--wrong:#ef4444;--text:#e2e8f0;--muted:#64748b;
--border:#1e293b;--warn:#f59e0b;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
.noise{position:fixed;inset:0;pointer-events:none;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
.app{max-width:560px;margin:0 auto;padding:16px 16px 100px}
header{text-align:center;padding:24px 0 16px}
header h1{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:4px}
header p{font-size:20px;font-weight:700;line-height:1.3}
.stats-bar{display:flex;gap:6px;margin-bottom:14px}
.stat{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center}
.stat .num{font-family:'Space Mono',monospace;font-size:18px;font-weight:700}
.stat .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
.stat.score .num{color:var(--accent)}
.stat.streak .num{color:var(--accent2)}
.stat.timer .num{color:var(--warn)}
.progress-wrap{background:var(--card);border-radius:99px;height:5px;margin-bottom:18px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s ease}
.q-counter{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:8px;letter-spacing:1px;display:flex;justify-content:space-between;align-items:center}
.q-counter .actions button{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:2px 6px;transition:color .2s}
.q-counter .actions button:hover{color:var(--accent)}
.q-counter .actions button.bookmarked{color:var(--warn)}
.question-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 18px;margin-bottom:14px;animation:fadeUp .3s ease}
.question-card h2{font-size:16px;font-weight:500;line-height:1.55}
.topic-tag{display:inline-block;font-size:10px;font-family:'Space Mono',monospace;color:var(--accent2);background:rgba(167,139,250,.1);padding:2px 8px;border-radius:99px;margin-bottom:10px;letter-spacing:.5px}
.options{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.opt-btn{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:10px;line-height:1.45}
.opt-btn:active{transform:scale(.98)}
.opt-btn:hover:not(.disabled){border-color:var(--accent);background:rgba(34,211,238,.04)}
.opt-btn .key{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;min-width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:5px;background:var(--border);flex-shrink:0;margin-top:1px}
.opt-btn.selected-correct{border-color:var(--correct);background:rgba(16,185,129,.08)}
.opt-btn.selected-correct .key{background:var(--correct);color:#fff}
.opt-btn.selected-wrong{border-color:var(--wrong);background:rgba(239,68,68,.08)}
.opt-btn.selected-wrong .key{background:var(--wrong);color:#fff}
.opt-btn.show-correct{border-color:var(--correct);background:rgba(16,185,129,.05)}
.opt-btn.show-correct .key{background:var(--correct);color:#fff}
.opt-btn.disabled{cursor:default;opacity:.6}
.opt-btn.disabled.selected-correct,.opt-btn.disabled.selected-wrong,.opt-btn.disabled.show-correct{opacity:1}
.explanation{background:rgba(34,211,238,.05);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;padding:12px 14px;margin-bottom:14px;font-size:13px;line-height:1.6;color:#cbd5e1;animation:fadeUp .25s ease}
.explanation strong{color:var(--accent);font-weight:600}
.next-btn{width:100%;padding:13px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0a0f1a;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:transform .15s,opacity .15s;letter-spacing:.3px}
.next-btn:active{transform:scale(.97)}
.skip-btn{width:100%;padding:13px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;margin-top:8px}
.skip-btn:hover{border-color:var(--muted);color:var(--text)}
.setup{animation:fadeUp .3s ease}
.setup h2{font-size:18px;font-weight:700;margin-bottom:16px}
.setup-section{margin-bottom:20px}
.setup-section label{display:block;font-size:11px;font-family:'Space Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.size-options{display:flex;gap:6px;flex-wrap:wrap}
.size-btn{padding:10px 16px;border:1.5px solid var(--border);border-radius:8px;background:transparent;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.size-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(34,211,238,.06)}
.size-btn:hover:not(.active){border-color:var(--muted)}
.topic-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);font-size:11px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;transition:all .15s}
.chip.active{border-color:var(--accent2);color:var(--accent2);background:rgba(167,139,250,.08)}
.chip:hover:not(.active){border-color:var(--muted)}
.mode-pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{padding:8px 14px;border:1.5px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);font-size:13px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;transition:all .15s}
.pill.active{border-color:var(--accent);color:var(--accent);background:rgba(34,211,238,.06)}
.start-btn{width:100%;padding:15px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0a0f1a;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;letter-spacing:.3px}
.start-btn:active{transform:scale(.98)}
.q-total{font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);text-align:center;margin:12px 0 4px;letter-spacing:.5px}
.results{text-align:center;padding:32px 0;animation:fadeUp .35s ease}
.results .big{font-size:56px;font-weight:700;font-family:'Space Mono',monospace;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.results p{color:var(--muted);margin-top:6px;font-size:14px;line-height:1.6}
.results .grade{font-size:15px;font-weight:700;margin-top:12px;padding:8px 20px;border-radius:99px;display:inline-block}
.grade-a{background:rgba(16,185,129,.15);color:var(--correct)}
.grade-b{background:rgba(34,211,238,.15);color:var(--accent)}
.grade-c{background:rgba(245,158,11,.15);color:var(--warn)}
.grade-f{background:rgba(239,68,68,.15);color:var(--wrong)}
.result-details{text-align:left;margin-top:20px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.result-details h3{font-size:12px;font-family:'Space Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.topic-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px}
.result-btns{display:flex;flex-direction:column;gap:8px;margin-top:20px}
.result-btns .next-btn{padding:14px}
.hidden{display:none!important}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:380px){.app{padding:10px 10px 80px}.question-card{padding:16px 14px}.opt-btn{padding:10px 12px;font-size:13px}.stat .num{font-size:16px}}
</style>
</head>
<body>
<div class="noise"></div>
<div class="app">
<header>
<h1>GST 206</h1>
<p>Environment &amp; Sustainable Development</p>
</header>
<div id="setupArea"></div>
<div id="quizHeader" class="hidden">
  <div class="stats-bar">
    <div class="stat score"><div class="num" id="scoreNum">0%</div><div class="lbl">Score</div></div>
    <div class="stat streak"><div class="num" id="streakNum">0</div><div class="lbl">Streak</div></div>
    <div class="stat timer"><div class="num" id="timerNum">0:00</div><div class="lbl">Time</div></div>
    <div class="stat"><div class="num" id="doneNum">0</div><div class="lbl">Done</div></div>
  </div>
  <div class="progress-wrap"><div class="progress-fill" id="progFill"></div></div>
</div>
<div id="quizArea" class="hidden"></div>
<div id="resultsArea" class="hidden"></div>
</div>
<script>
const Q=[
// ENVIRONMENT & ECOSYSTEM
{t:"Environment & Ecosystem",q:"What does the term 'environment' encompass?",o:["Only the natural world","The surroundings including physical, chemical, and biological factors","Only man-made structures","Only atmospheric conditions"],a:1,e:"Environment includes all physical, chemical, and biological factors — both natural and human-made."},
{t:"Environment & Ecosystem",q:"An ecosystem is best described as:",o:["A community of organisms only","The physical environment only","A community of living organisms interacting with their physical environment","A government policy on nature"],a:2,e:"An ecosystem is the interaction between living organisms (biotic) and their non-living surroundings (abiotic)."},
{t:"Environment & Ecosystem",q:"Which of the following is a biotic component?",o:["Sunlight","Water","Plants","Soil minerals"],a:2,e:"Biotic components are living things — plants, animals, microorganisms."},
{t:"Environment & Ecosystem",q:"Which is an abiotic factor in an ecosystem?",o:["Bacteria","Temperature","Fungi","Trees"],a:1,e:"Temperature is non-living (abiotic). Bacteria, fungi, and trees are biotic."},
{t:"Environment & Ecosystem",q:"The study of organism–environment interactions is called:",o:["Biology","Ecology","Geography","Geology"],a:1,e:"Ecology studies interactions among organisms and between organisms and their environment."},
{t:"Environment & Ecosystem",q:"A food chain represents:",o:["The economic cost of food","The transfer of energy from one organism to another","Government food policy","Chemical composition of food"],a:1,e:"A food chain traces energy transfer from producers through consumers."},
{t:"Environment & Ecosystem",q:"Environment refers to:",o:["Only plants","Only animals","The surroundings of living and non-living things","Only water"],a:2,e:"Environment includes both living and non-living components."},
{t:"Environment & Ecosystem",q:"The biotic component includes:",o:["Soil and water","Plants and animals","Air and sunlight","Rocks"],a:1,e:"Biotic = living. Plants and animals are living components."},
{t:"Environment & Ecosystem",q:"Abiotic factors include:",o:["Plants","Animals","Microorganisms","Soil and sunlight"],a:3,e:"Abiotic = non-living elements like soil, sunlight, temperature."},
{t:"Environment & Ecosystem",q:"Which is NOT part of an ecosystem?",o:["Producers","Consumers","Decomposers","Computers"],a:3,e:"Computers are human-made, not ecosystem components."},
{t:"Environment & Ecosystem",q:"Green plants are known as:",o:["Consumers","Producers","Decomposers","Parasites"],a:1,e:"Plants produce food via photosynthesis."},
{t:"Environment & Ecosystem",q:"Animals that eat plants are called:",o:["Carnivores","Herbivores","Omnivores","Parasites"],a:1,e:"Herbivores are primary consumers feeding on plants."},
{t:"Environment & Ecosystem",q:"Animals eating both plants and animals are:",o:["Carnivores","Herbivores","Omnivores","Decomposers"],a:2,e:"Omnivores have a mixed diet — humans are a common example."},
{t:"Environment & Ecosystem",q:"Organisms that break down dead materials are:",o:["Producers","Decomposers","Consumers","Predators"],a:1,e:"Decomposers like bacteria and fungi recycle nutrients."},
{t:"Environment & Ecosystem",q:"Biodiversity refers to:",o:["Only animal count","Variety of life at genetic, species, and ecosystem levels","Only plant species","Only marine organisms"],a:1,e:"Biodiversity encompasses genetic, species, and ecosystem diversity."},
{t:"Environment & Ecosystem",q:"A food web differs from a food chain because it:",o:["Is simpler","Shows multiple interconnected feeding relationships","Includes only producers","Ignores decomposers"],a:1,e:"A food web is a complex network of interconnected food chains."},
{t:"Environment & Ecosystem",q:"A biome is best described as:",o:["A single organism","A large geographic area with distinct climate and organisms","A type of pollution","A farming method"],a:1,e:"Biomes are large-scale ecosystems defined by climate and dominant vegetation."},
{t:"Environment & Ecosystem",q:"The water cycle includes all EXCEPT:",o:["Evaporation","Condensation","Precipitation","Combustion"],a:3,e:"Combustion is a chemical process, not part of the water cycle."},
{t:"Environment & Ecosystem",q:"Ecological balance means:",o:["Harmony between organisms and environment","Destruction of nature","Pollution increase","Elimination of animals"],a:0,e:"Ecological balance is a stable equilibrium between species and their environment."},
{t:"Environment & Ecosystem",q:"Habitat destruction leads to:",o:["More biodiversity","Loss of biodiversity","Environmental improvement","Soil formation"],a:1,e:"Destroying habitats removes living spaces, driving species loss."},
{t:"Environment & Ecosystem",q:"Primary succession occurs on:",o:["Previously vegetated land","Bare rock or new land with no soil","Farmland","Urban areas"],a:1,e:"Primary succession begins on completely new surfaces with no existing soil."},
{t:"Environment & Ecosystem",q:"The trophic level with most energy is:",o:["Top predators","Secondary consumers","Primary consumers","Producers"],a:3,e:"Producers capture energy directly from sunlight — about 90% is lost at each subsequent level."},
{t:"Environment & Ecosystem",q:"Symbiosis refers to:",o:["Competition","A close, long-term interaction between two species","Predation","Decomposition"],a:1,e:"Symbiosis includes mutualism, commensalism, and parasitism."},
{t:"Environment & Ecosystem",q:"A keystone species is one whose:",o:["Population is largest","Removal drastically changes an ecosystem","Diet is most varied","Habitat is smallest"],a:1,e:"Keystone species have disproportionately large effects on their ecosystem."},
{t:"Environment & Ecosystem",q:"Photosynthesis converts:",o:["Oxygen to carbon dioxide","Light energy to chemical energy in glucose","Glucose to oxygen","Water to minerals"],a:1,e:"Plants use sunlight to convert CO₂ and water into glucose and oxygen."},
{t:"Environment & Ecosystem",q:"The lithosphere refers to:",o:["The water component of Earth","The air and atmosphere","The solid outer layer of Earth","The living organisms on Earth"],a:2,e:"The lithosphere is Earth's rigid outer shell — the crust and upper mantle."},
{t:"Environment & Ecosystem",q:"Nitrogen fixation is important because it:",o:["Removes nitrogen from the atmosphere permanently","Converts atmospheric nitrogen into forms usable by plants","Creates oxygen","Causes acid rain"],a:1,e:"Nitrogen-fixing bacteria convert N₂ into ammonia, making it available for plant uptake."},

// HUMAN-ENVIRONMENT RELATIONSHIP
{t:"Human–Environment Relationship",q:"'Environment as an asset' means:",o:["Environment has no value","Environment provides valuable resources and services","Only forests have value","Environment is a liability"],a:1,e:"Viewing environment as an asset recognizes its valuable resources and ecosystem services."},
{t:"Human–Environment Relationship",q:"Which is an ecosystem service?",o:["Industrial pollution","Water purification by wetlands","Deforestation","Overfishing"],a:1,e:"Wetlands naturally filter water — a classic ecosystem service."},
{t:"Human–Environment Relationship",q:"Deforestation primarily leads to:",o:["Increased biodiversity","Soil erosion, habitat loss, and climate change","Better air quality","More rainfall"],a:1,e:"Removing forests causes erosion, destroys habitats, and releases stored carbon."},
{t:"Human–Environment Relationship",q:"Which activity contributes MOST to environmental degradation?",o:["Planting trees","Industrialization and urbanization","Wildlife conservation","Organic farming"],a:1,e:"Industrialization involves large-scale resource extraction, pollution, and habitat destruction."},
{t:"Human–Environment Relationship",q:"'Carrying capacity' refers to:",o:["Cargo capacity","Maximum population an environment can sustain","Speed of change","Government targets"],a:1,e:"Carrying capacity is the maximum organisms an environment supports without degradation."},
{t:"Human–Environment Relationship",q:"Environmental determinism argues that:",o:["Humans fully control nature","Physical environment shapes human societies","Culture has no link to environment","Technology eliminates environmental influence"],a:1,e:"Environmental determinism holds that climate and terrain largely determine how societies develop."},
{t:"Human–Environment Relationship",q:"Environmental possibilism suggests that:",o:["Environment completely controls humans","Humans can adapt to and modify their environment","Nature cannot be changed","Technology is irrelevant"],a:1,e:"Possibilism argues humans have agency to adapt and innovate within environmental constraints."},
{t:"Human–Environment Relationship",q:"Ecosystem services are classified into all EXCEPT:",o:["Provisioning services","Regulating services","Cultural services","Manufacturing services"],a:3,e:"The four categories are provisioning, regulating, cultural, and supporting services."},
{t:"Human–Environment Relationship",q:"An example of a provisioning service is:",o:["Climate regulation","Food and fresh water","Spiritual value","Nutrient cycling"],a:1,e:"Provisioning services are the products obtained from ecosystems — food, water, timber, fiber."},

// GLOBAL CLIMATE CHANGE
{t:"Global Climate Change",q:"Greenhouse gases include all EXCEPT:",o:["CO₂","Methane","Nitrogen (N₂)","Nitrous oxide"],a:2,e:"N₂ makes up 78% of atmosphere but is NOT a greenhouse gas."},
{t:"Global Climate Change",q:"The greenhouse effect is:",o:["Always harmful","Trapping of heat by atmospheric gases","A farming technique","Caused only by humans"],a:1,e:"The greenhouse effect is natural and essential. Human activities intensify it."},
{t:"Global Climate Change",q:"The Kyoto Protocol aimed to:",o:["Reduce greenhouse emissions with binding targets","Promote free trade","End world hunger","Explore space"],a:0,e:"The Kyoto Protocol (1997) set binding emission reduction targets."},
{t:"Global Climate Change",q:"The Paris Agreement aims to:",o:["Eliminate all fossil fuels immediately","Limit warming to well below 2°C","Ban all industry","Focus only on rich countries"],a:1,e:"The Paris Agreement targets well below 2°C, pursuing 1.5°C."},
{t:"Global Climate Change",q:"The LARGEST contributor to global emissions is:",o:["Agriculture","Transportation","Energy production","Waste management"],a:2,e:"Burning fossil fuels for electricity and heat is the single largest emissions source."},
{t:"Global Climate Change",q:"IPCC stands for:",o:["International Panel on Carbon Control","Intergovernmental Panel on Climate Change","International Programme for Climate Cooperation","Intergovernmental Policy on Carbon Capture"],a:1,e:"The IPCC is the UN body assessing climate science."},
{t:"Global Climate Change",q:"Global warming refers to:",o:["Rise in Earth's average surface temperature","Seasonal changes","The ozone hole","Volcanic heating"],a:0,e:"Global warming is the long-term increase in Earth's average surface temperature."},
{t:"Global Climate Change",q:"Ozone depletion is caused mainly by:",o:["CO₂","CFCs","Methane","Water vapor"],a:1,e:"CFCs release chlorine that destroys ozone molecules."},
{t:"Global Climate Change",q:"Acid rain is caused by:",o:["CO₂ and methane","SO₂ and nitrogen oxides","Oxygen and hydrogen","CFCs"],a:1,e:"SO₂ and NOₓ react with water vapor to form acids."},
{t:"Global Climate Change",q:"Which gas contributes most to warming?",o:["Oxygen","Nitrogen","Carbon dioxide","Helium"],a:2,e:"CO₂ is the dominant greenhouse gas from human activities."},
{t:"Global Climate Change",q:"Global warming causes:",o:["Temperature decrease","Sea level rise","Freezing oceans","Less rainfall"],a:1,e:"Warming causes thermal expansion and ice melting, raising sea levels."},
{t:"Global Climate Change",q:"Climate change is:",o:["Short-term weather","Long-term change in climate patterns","Daily temperature change","Wind movement"],a:1,e:"Climate change involves sustained shifts over decades or longer."},
{t:"Global Climate Change",q:"Burning fossil fuels releases:",o:["Nitrogen","Oxygen","Carbon dioxide","Hydrogen"],a:2,e:"Combustion releases CO₂ as carbon combines with oxygen."},
{t:"Global Climate Change",q:"The Paris Agreement was signed in:",o:["2015","1992","1987","2000"],a:0,e:"Adopted December 2015 at COP21."},
{t:"Global Climate Change",q:"Climate resilience is:",o:["Ability to recover from climate impacts","Ignoring climate change","Increasing pollution","Destroying forests"],a:0,e:"Resilience is the capacity to absorb and recover from climate shocks."},
{t:"Global Climate Change",q:"Climate adaptation means:",o:["Adjusting to climate effects","Ignoring climate change","Increasing pollution","Destroying forests"],a:0,e:"Adaptation adjusts practices to moderate climate damage."},
{t:"Global Climate Change",q:"Climate mitigation means:",o:["Reducing emissions","Increasing pollution","Destroying forests","Ignoring climate change"],a:0,e:"Mitigation reduces emissions to limit future climate change."},
{t:"Global Climate Change",q:"The Montreal Protocol addressed:",o:["Climate change","Ozone-depleting substances","Biodiversity","Deforestation"],a:1,e:"It successfully phased out CFCs and other ozone-depleting substances."},
{t:"Global Climate Change",q:"A carbon sink is:",o:["CO₂ emission source","A reservoir absorbing more carbon than it releases","A type of pollution","An industrial process"],a:1,e:"Forests, oceans, and soil absorb CO₂ from the atmosphere."},
{t:"Global Climate Change",q:"The enhanced greenhouse effect is:",o:["Natural greenhouse effect","Intensification due to human activities","Cooling of the planet","Ozone formation"],a:1,e:"The additional warming caused by human-produced greenhouse gases."},
{t:"Global Climate Change",q:"Sea level rise is caused by:",o:["Thermal expansion and melting ice","Increased evaporation only","Volcanic activity","Reduced rainfall"],a:0,e:"Warming oceans expand and melting ice adds water, both raising sea levels."},
{t:"Global Climate Change",q:"COP in climate negotiations stands for:",o:["Conference of the Parties","Committee on Pollution","Council of Parliaments","Charter of Principles"],a:0,e:"COP is the Conference of the Parties — the decision-making body of the UNFCCC."},
{t:"Global Climate Change",q:"Methane is a particularly potent greenhouse gas because:",o:["It's the most abundant","It traps much more heat per molecule than CO₂","It destroys ozone","It's only from human activities"],a:1,e:"Methane has about 80x the warming potential of CO₂ over 20 years, though it's less abundant."},

// ENVIRONMENTAL ISSUES
{t:"Environmental Issues",q:"Environmental pollution is:",o:["Improving the environment","Contaminating the environment","Conserving nature","Protecting wildlife"],a:1,e:"Pollution introduces harmful contaminants into the natural environment."},
{t:"Environmental Issues",q:"Air pollution is mainly caused by:",o:["Trees","Vehicles and industries","Rivers","Rain"],a:1,e:"Vehicle exhaust and industrial emissions are primary air pollution sources."},
{t:"Environmental Issues",q:"Which causes soil erosion?",o:["Planting trees","Overgrazing","Conservation","Irrigation"],a:1,e:"Overgrazing removes vegetation, exposing soil to erosion."},
{t:"Environmental Issues",q:"Noise pollution mainly occurs in:",o:["Quiet villages","Industrial cities","Forests","Farms"],a:1,e:"Cities have concentrated noise from factories, traffic, and construction."},
{t:"Environmental Issues",q:"Water pollution can be caused by:",o:["Industrial waste","Rainwater","Sunlight","Wind"],a:0,e:"Industrial effluents with chemicals are a major water contamination source."},
{t:"Environmental Issues",q:"Land degradation is:",o:["Soil improvement","Decline in land quality","Vegetation increase","Soil conservation"],a:1,e:"Land degradation is deterioration through erosion, nutrient loss, and contamination."},
{t:"Environmental Issues",q:"Urbanization is:",o:["Moving to rural areas","Growth of cities","Population reduction","Forest increase"],a:1,e:"Urbanization concentrates people in cities."},
{t:"Environmental Issues",q:"Flooding can be caused by:",o:["Climate change","Soil conservation","Reduced rainfall","Reforestation"],a:0,e:"Climate change intensifies rainfall and raises sea levels, increasing floods."},
{t:"Environmental Issues",q:"Soil fertility is:",o:["Soil dryness","Soil pollution","Ability to support plant growth","Soil erosion"],a:2,e:"Fertility depends on nutrient content and organic matter."},
{t:"Environmental Issues",q:"Pollution prevention is:",o:["Controlling pollution before it occurs","Increasing waste","Burning waste","Ignoring pollution"],a:0,e:"Prevention eliminates pollution at its source."},
{t:"Environmental Issues",q:"Eutrophication is caused by:",o:["Excess nutrients (nitrogen, phosphorus)","Reduced sunlight","Cold temperatures","Clean water"],a:0,e:"Excess nutrients cause algal blooms that deplete oxygen."},
{t:"Environmental Issues",q:"E-waste refers to:",o:["Energy waste","Discarded electronics","Emissions waste","Environmental waste"],a:1,e:"E-waste includes discarded computers, phones, and electronics."},

function shuffle(a){let r=[...a];for(let i=r.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]]}return r}
function fmt(s){return Math.floor(s/60)+':'+(s%60<10?'0':'')+(s%60)}

  <div class="setup-section" id="topicSection"><label>Topics <span style="color:var(--text);text-transform:none;font-family:DM Sans;font-weight:400">(tap to filter)</span></label>
  <div class="topic-chips">${allTopics.map(t=>`<div class="chip active" onclick="toggleChip(this)">${t} <span style="opacity:.5">(${tc[t]})</span></div>`).join('')}</div></div>
  <div class="setup-section"><label>Questions per session</label>
  <div class="size-options">
    <div class="size-btn" onclick="pickSize(this,10)">10</div>
    <div class="size-btn" onclick="pickSize(this,20)">20</div>

    <div class="size-btn" onclick="pickSize(this,50)">50</div>
    <div class="size-btn" onclick="pickSize(this,100)">100</div>
    <div class="size-btn active" onclick="pickSize(this,0)">All</div>
  </div></div>
  <div class="q-total" id="qTotal">${Q.length} questions available</div>
  <button class="start-btn" onclick="startQuiz()">Start Quiz →</button>
  </div>`;
  document.getElementById('setupArea').classList.remove('hidden');
  sessionSize=0;mode='fresh';selectedTopics=[...allTopics];
}

function pickMode(el,m){
  el.parentElement.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');mode=m;
  document.getElementById('topicSection').style.display=m==='bookmarks'?'none':'';
  updTotal();
}
function toggleChip(el){el.classList.toggle('active');updTotal()}
function pickSize(el,n){
  el.parentElement.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');sessionSize=n;updTotal();
}
function updTotal(){
  selectedTopics=[];
  document.querySelectorAll('.chip.active').forEach(c=>selectedTopics.push(c.textContent.replace(/\s*\(\d+\)/,'')));
  let pool;
  if(mode==='bookmarks') pool=bookmarks.size;
  else if(mode==='weak'){let w=Object.keys(weakTopics);pool=w.length?Q.filter(q=>w.includes(q.t)).length:Q.length;}
  else pool=Q.filter(q=>selectedTopics.includes(q.t)).length;
  let n=sessionSize?Math.min(sessionSize,pool):pool;
  let el=document.getElementById('qTotal');
  if(el) el.textContent=n+' questions in this session';
}

// ===== QUIZ =====
function startQuiz(){
  document.getElementById('setupArea').classList.add('hidden');
  document.getElementById('quizHeader').classList.remove('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  document.getElementById('resultsArea').classList.add('hidden');
  qi=0;correct=0;answered=0;skipped=0;streak=0;bestStreak=0;seconds=0;
  let pool;
  if(mode==='bookmarks') pool=Q.filter((_,i)=>bookmarks.has(i));
  else if(mode==='weak'){let w=Object.keys(weakTopics);pool=w.length?Q.filter(q=>w.includes(q.t)):shuffle(Q);}
  else pool=Q.filter(q=>selectedTopics.includes(q.t));
  questions=shuffle(pool);
  if(sessionSize&&sessionSize<questions.length) questions=questions.slice(0,sessionSize);
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{seconds++;document.getElementById('timerNum').textContent=fmt(seconds)},1000);
  document.getElementById('timerNum').textContent='0:00';
  updateStats();showQuestion();
}

function updateStats(){
  let t=answered+skipped,pct=answered?Math.round(correct/answered*100):0;
  document.getElementById('scoreNum').textContent=pct+'%';
  document.getElementById('streakNum').textContent=streak;
  document.getElementById('doneNum').textContent=t+'/'+questions.length;
  document.getElementById('progFill').style.width=(t/questions.length*100)+'%';
}

let csA=-1;
function showQuestion(){
  if(qi>=questions.length){showResults();return}
  let q=questions[qi],gi=Q.indexOf(q),bm=bookmarks.has(gi);
  let ix=[0,1,2,3];for(let i=3;i>0;i--){let j=Math.floor(Math.random()*(i+1));[ix[i],ix[j]]=[ix[j],ix[i]]}
  csA=ix.indexOf(q.a);let so=ix.map(i=>q.o[i]);
  document.getElementById('quizArea').innerHTML=`<div class="q-counter">
    <span>Q ${qi+1} / ${questions.length}</span>
    <span class="actions"><button onclick="togBM(${gi})" id="bmBtn" class="${bm?'bookmarked':''}" title="Bookmark">★</button></span>
  </div>
  <div class="question-card"><span class="topic-tag">${q.t}</span><h2>${q.q}</h2></div>
  <div class="options">${so.map((o,i)=>`<button class="opt-btn" onclick="pick(${i})" id="opt${i}"><span class="key">${'ABCD'[i]}</span><span>${o}</span></button>`).join('')}</div>
  <div id="fb"></div>
  <button class="skip-btn" id="skipBtn" onclick="doSkip()">Skip →</button>`;
}

function togBM(i){if(bookmarks.has(i))bookmarks.delete(i);else bookmarks.add(i);let b=document.getElementById('bmBtn');if(b)b.classList.toggle('bookmarked')}
function doSkip(){skipped++;qi++;updateStats();showQuestion()}

function pick(i){
  let q=questions[qi],btns=document.querySelectorAll('.opt-btn');
  btns.forEach(b=>{b.classList.add('disabled');b.onclick=null});
  document.getElementById('skipBtn').classList.add('hidden');
  answered++;let ok=i===csA;
  if(ok){correct++;streak++;if(streak>bestStreak)bestStreak=streak;btns[i].classList.add('selected-correct')}
  else{streak=0;btns[i].classList.add('selected-wrong');btns[csA].classList.add('show-correct');weakTopics[q.t]=(weakTopics[q.t]||0)+1}
  updateStats();
  document.getElementById('fb').innerHTML=`<div class="explanation"><strong>${ok?'Correct!':'Not quite.'}</strong> ${q.e}</div>
  <button class="next-btn" onclick="qi++;showQuestion()">${qi>=questions.length-1?'See Results →':'Next →'}</button>`;
}

// ===== RESULTS =====
function showResults(){
  clearInterval(timerInterval);
  document.getElementById('quizHeader').classList.add('hidden');
  document.getElementById('quizArea').classList.add('hidden');
  document.getElementById('resultsArea').classList.remove('hidden');
  let pct=answered?Math.round(correct/answered*100):0;
  let g,gc;if(pct>=70){g='A — Exam Ready';gc='grade-a'}else if(pct>=60){g='B — Almost There';gc='grade-b'}else if(pct>=50){g='C — Needs Work';gc='grade-c'}else{g='F — Keep Practicing';gc='grade-f'}
  let wl=Object.entries(weakTopics).sort((a,b)=>b[1]-a[1]);
  let html=`<div class="results"><div class="big">${pct}%</div><div class="grade ${gc}">${g}</div>
  <p style="margin-top:12px">${correct} correct · ${answered-correct} wrong · ${skipped} skipped · ${fmt(seconds)}</p>
  <p>Best streak: ${bestStreak}</p>`;
  if(wl.length){
    html+=`<div class="result-details"><h3>Topics to Review</h3>${wl.slice(0,6).map(([t,w])=>{
      let c=w>3?'var(--wrong)':w>1?'var(--warn)':'var(--accent)';
      return `<div class="topic-row"><span>${t}</span><span style="color:${c};font-family:'Space Mono',monospace;font-size:12px">${w} wrong</span></div>`}).join('')}</div>`;
  }
  html+=`<div class="result-btns"><button class="next-btn" onclick="showSetup()">New Session</button>
  ${wl.length?`<button class="next-btn" style="background:linear-gradient(135deg,var(--accent2),#ec4899)" onclick="mode='weak';startQuiz()">Practice Weak Areas</button>`:''}
  ${bookmarks.size?`<button class="next-btn" style="background:linear-gradient(135deg,var(--warn),#f97316)" onclick="mode='bookmarks';startQuiz()">Review Bookmarked (${bookmarks.size})</button>`:''}
  </div></div>`;
  document.getElementById('resultsArea').innerHTML=html;
}

showSetup();
</script>
</body>
</html>
